name: invensure_mobile
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter

  # Default icon set
  cupertino_icons: ^1.0.8

  # InvenSure packages (API & Data)
  http: ^1.2.0
  shared_preferences: ^2.2.2
  intl: ^0.19.0
  
  # Scanner
  mobile_scanner: ^5.0.0
  
  # PDF & Reporting
  pdf: ^3.10.0
  printing: ^5.11.0

  # Notifications
  flutter_local_notifications: ^17.0.0
  timezone: ^0.9.2

  # ✅ NEW: IMAGE & COMPRESSION (Added these!)
  image_picker: ^1.0.7
  flutter_image_compress: ^2.1.0

# Tools used for building
dev_dependencies:
  flutter_test:
    sdk: flutter
  
  flutter_lints: ^6.0.0
  
  flutter_launcher_icons: ^0.13.1

# Configuration
flutter:
  uses-material-design: true

  assets:
    - assets/logo.png

flutter_launcher_icons:
  android: "ic_launcher"
  ios: true
  image_path: "assets/logo.png"
  min_sdk_android: 21