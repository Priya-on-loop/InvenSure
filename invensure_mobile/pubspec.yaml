name: InvenSure
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter

  # Default icon set
  cupertino_icons: ^1.0.8

  # InvenSure packages
  http: ^1.2.0
  shared_preferences: ^2.2.2
  mobile_scanner: ^5.0.0
  intl: ^0.19.0
  
  # PDF & PRINTING
  pdf: ^3.10.0
  printing: ^5.11.0

  # ✅ NEW: Notifications & Time
  flutter_local_notifications: ^17.0.0
  timezone: ^0.9.2

# ✅ DEV DEPENDENCIES (Tools used for building)
dev_dependencies:
  flutter_test:
    sdk: flutter
  
  # Recommended lints
  flutter_lints: ^6.0.0
  
  # ✅ APP ICON GENERATOR
  flutter_launcher_icons: ^0.13.1

# Flutter configuration
flutter:
  uses-material-design: true

  # ✅ ASSETS ENABLED HERE
  assets:
    - assets/logo.png

# ✅ CONFIGURATION FOR GENERATING THE ICON
flutter_launcher_icons:
  android: "ic_launcher"
  ios: true
  image_path: "assets/logo.png"
  min_sdk_android: 21